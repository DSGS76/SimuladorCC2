<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloreado - Simulador CC2</title>
    <link rel="stylesheet" href="../../bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="coloreado.css">
</head>
<body>
<header class="header-section mb-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="text-white">
                <h1 class="header-title mb-1">Ciencias de la Computación 2</h1>
            </div>
            <a href="../grafos.html" class="btn btn-outline-light">Volver atrás</a>
        </div>
    </div>
</header>

<div class="container pb-4">
    <section class="panel-section">
        <div class="panel-header">
            <div>
                <h3 class="panel-title">Coloreado de grafos</h3>
                <p class="panel-subtitle">Colorea vértices aleatoriamente y muestra P(λ), X(G), X'(G).</p>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-lg-6">
                <div class="subpanel">
                    <h6 class="subpanel-title">Vértices</h6>
                    <input type="text" class="form-control mb-2" id="cVerticeNombre" placeholder="Nombre del vértice">
                    <div class="d-flex gap-2">
                        <button class="btn btn-success flex-fill" id="btnCAgregarVertice">Agregar</button>
                        <button class="btn btn-danger flex-fill" id="btnCEliminarVertice">Eliminar</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="subpanel">
                    <h6 class="subpanel-title">Aristas del grafo</h6>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><input type="text" class="form-control" id="cAristaInicio" placeholder="Inicio"></div>
                        <div class="col-6"><input type="text" class="form-control" id="cAristaFin" placeholder="Fin"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success flex-fill" id="btnCAgregarArista">Agregar arista</button>
                        <button class="btn btn-danger flex-fill" id="btnCEliminarArista">Eliminar arista</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary" id="btnCOperar">Calcular</button>
                <button class="btn btn-warning" id="btnCLimpiar">Limpiar</button>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-secondary" id="btnCCargar">Cargar</button>
                <button class="btn btn-outline-secondary" id="btnCGuardar">Guardar</button>
            </div>
            <input type="file" id="fileInputColoreado" accept="application/json" class="d-none">
        </div>

        <div id="mensajeColoreado" class="alert d-none mb-3" role="alert"></div>

        <div class="row g-3 mb-3">
            <div class="col-lg-4"><div class="ecuacion-box" id="cNotacion"></div></div>
            <div class="col-lg-8"><div class="ecuacion-box" id="cResultado"></div></div>
        </div>

        <div class="row g-3">
            <div class="col-lg-6">
                <label class="form-label fw-semibold">Grafo original</label>
                <div class="grafo-canvas" id="cGrafoOriginal"></div>
            </div>
            <div class="col-lg-6">
                <label class="form-label fw-semibold">Resultado coloreado</label>
                <div class="grafo-canvas" id="cGrafoResultado"></div>
            </div>
        </div>
    </section>
</div>

<script src="../../bootstrap/js/bootstrap.bundle.js"></script>
<script src="../../d3/d3.v7.js"></script>
<script src="coloreado.js"></script>
</body>
</html>
